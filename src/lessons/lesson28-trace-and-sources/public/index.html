<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 28 Trace and Sources</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="main-grid">
        <section class="chat-shell">
          <header class="chat-header">
            <div>
              <p class="eyebrow">Ts AI Agent 学习课程 · 第二阶段</p>
              <h1>Lesson 28 Trace & Sources</h1>
            </div>
            <span class="status" id="status">Ready</span>
          </header>

          <section class="messages" id="messages">
            <div class="message assistant">
              <div class="role">AI Agent</div>
              <div class="content">
                你好，我是第 28 课的 Chat UI。这一课会在回答时展示 Trace 和 Sources。
              </div>
            </div>
          </section>

          <form class="composer" id="chatForm">
            <textarea
              id="messageInput"
              rows="3"
              placeholder="请输入你的问题，例如：Explain SSE streaming in a simple way"
            ></textarea>

            <div class="actions">
              <button type="submit" id="sendButton">发送</button>
              <button type="button" id="stopButton" class="secondary" disabled>
                停止
              </button>
            </div>
          </form>
        </section>

        <aside class="inspector">
          <section class="panel">
            <div class="panel-title">Request</div>
            <div class="meta-row">
              <span>requestId</span>
              <strong id="requestId">-</strong>
            </div>
            <div class="meta-row">
              <span>duration</span>
              <strong id="duration">-</strong>
            </div>
          </section>

          <section class="panel">
            <div class="panel-title">Trace</div>
            <div class="trace-list" id="traceList">
              <p class="empty">等待请求开始...</p>
            </div>
          </section>

          <section class="panel">
            <div class="panel-title">Sources</div>
            <div class="sources-list" id="sourcesList">
              <p class="empty">暂无来源</p>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
